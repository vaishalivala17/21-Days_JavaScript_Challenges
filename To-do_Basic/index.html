<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic To-Do App</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Main Card -->
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-todo text-white py-3">
                        <h3 class="mb-0 text-center">
                            <i class="bi bi-check2-square me-2"></i>To-Do List
                        </h3>
                    </div>
                    <div class="card-body p-4">
                        <!-- Input Group -->
                        <div class="input-group mb-4">
                            <input type="text" 
                                   id="taskInput" 
                                   class="form-control form-control-lg" 
                                   placeholder="Enter a new task..."
                                   aria-label="New task">
                            <button class="btn bg-todo text-light btn-lg" 
                                    type="button" 
                                    id="addBtn"
                                    onclick="addTask()">
                                <i class="bi bi-plus-lg me-1"></i>Add
                            </button>
                        </div>

                        <ul class="list-group list-group-flush" id="taskList">
                            <!-- Tasks  -->
                        </ul>

                        <!-- Empty State -->
                        <div id="emptyState" class="text-center text-muted py-4">
                            <i class="bi bi-clipboard-check display-4 mb-2"></i>
                            <p class="mb-0">No tasks yet. Add one above!</p>
                        </div>
                    </div>
                    <div class="card-footer bg-white text-center text-muted py-2">
                        <span id="taskCount">0 tasks</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="index.js"></script>
</body>
</html>
