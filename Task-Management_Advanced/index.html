<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XP Tracker – Gamified Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body class="dark-theme">
    <div class="container py-4" style="max-width: 720px;">
        <!-- Header / Profile Card -->
        <div class="profile-card card mb-3">
            <div class="card-body d-flex align-items-center gap-3 py-3">
                <div class="avatar">📋</div>
                <div class="flex-grow-1">
                    <h5 class="mb-2" id="userNameDisplay" title="Click to edit">Your Name</h5>
                    <div class="d-flex gap-2 flex-wrap">
                        <span class="stat-badge badge-lvl">Level <span id="level">1</span></span>
                        <span class="stat-badge badge-xp">⚡ <span id="xp">0</span> XP</span>
                        <span class="stat-badge badge-coin">🪙 <span id="coins">0</span></span>
                        <span class="stat-badge badge-task">✅ <span id="completedCount">0</span></span>
                    </div>
                </div>
            </div>
            <div class="px-4 pb-3">
                <div class="progress xp-bar" role="progressbar" aria-label="XP progress">
                    <div class="progress-bar xp-fill" id="xpBar" style="width: 0%"></div>
                </div>
                <small class="text-muted xp-label"><span id="xpCurrent">0</span> / <span id="xpNeeded">100</span> XP to next level</small>
            </div>
        </div>

        <!-- Filters & Stats -->
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <div class="filter-group btn-group fs-4">
                <button class="btn btn-sm btn-outline-light active p-2" data-filter="all">All</button>
                <button class="btn btn-sm btn-outline-light" data-filter="active">Active</button>
                <button class="btn btn-sm btn-outline-light" data-filter="completed">Completed</button>
            </div>
            <button class="btn btn-add" id="openAddModal">
                <span>+ Add Task</span>
            </button>
        </div>

        <!-- Task List -->
        <div class="task-container" id="taskList">
            <div class="text-center text-muted py-5" id="emptyState">
                <h5>No tasks yet</h5>
                <p>Add your first task to start earning XP!</p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content dark-modal">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle">Add New Task</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-light">Task Name</label>
                        <input type="text" class="form-control dark-input" id="modalTaskInput" placeholder="e.g., Complete workout">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-light">Planned Before</label>
                        <input type="datetime-local" class="form-control dark-input" id="modalPlannedDate">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Priority</label>
                        <div class="difficulty-selector">
                            <button class="diff-btn active" data-diff="easy" data-xp="10" data-coin="5">
                                <span>🟢 Low</span>
                                <small>+10 XP · 5🪙</small>
                            </button>
                            <button class="diff-btn" data-diff="medium" data-xp="25" data-coin="15">
                                <span>🟡 Medium</span>
                                <small>+25 XP · 15🪙</small>
                            </button>
                            <button class="diff-btn" data-diff="hard" data-xp="50" data-coin="30">
                                <span>🔴 High</span>
                                <small>+50 XP · 30🪙</small>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="modalSaveBtn">Save Task</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Reward Toast -->
    <div class="reward-toast" id="rewardToast">
        <div class="reward-content">
            <div class="reward-icon">🎉</div>
            <div class="reward-text">
                <strong>Task Complete!</strong>
                <div>+<span id="rewardXP">0</span> XP · +<span id="rewardCoin">0</span> 🪙</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
