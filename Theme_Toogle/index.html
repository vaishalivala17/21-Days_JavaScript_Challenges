<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle - Day 2 Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-slate-900 min-h-screen font-sans antialiased">
    <!-- Navbar -->
    <nav class="navbar bg-white/80 dark:bg-slate-800/80 backdrop-blur-md sticky top-0 z-50 shadow-lg border-b border-gray-200 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="text-2xl font-bold text-gray-900 dark:bg-gradient-to-r dark:from-indigo-400 dark:via-purple-400 dark:to-pink-400 dark:bg-clip-text dark:text-transparent">
                    🌙 Theme Toggle
                </div>
                <div class="hidden md:flex space-x-4">
                    <a href="#" class="text-gray-700 hover:text-gray-900 dark:text-slate-300 dark:hover:text-slate-100 px-3 py-2 rounded-md text-sm font-medium transition-all">Home</a>
                    <a href="#" class="text-gray-700 hover:text-gray-900 dark:text-slate-300 dark:hover:text-slate-100 px-3 py-2 rounded-md text-sm font-medium transition-all">About</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
        <div class="text-center mb-20">
            <h1 class="text-5xl md:text-7xl font-black bg-gradient-to-r from-gray-800 via-gray-900 to-slate-900 bg-clip-text text-transparent dark:from-indigo-400 dark:via-purple-400 dark:to-pink-400 mb-6">
                Beautiful Theme
                <span class="block text-3xl md:text-4xl font-light text-gray-500 dark:text-slate-400 mt-4">Toggle Experience</span>
            </h1>
            <p class="text-xl text-gray-600 dark:text-slate-400 max-w-2xl mx-auto leading-relaxed mb-12">
                Switch between light and dark modes with smooth animations.
            </p>
            
            <!-- Toggle -->
            <div class="theme-toggle inline-block p-4 bg-white/50 dark:bg-slate-800/50 backdrop-blur-md rounded-2xl shadow-xl border border-gray-200 dark:border-slate-700">
                <input type="checkbox" id="theme-toggle" class="peer">
                <label for="theme-toggle" class="toggle-slider cursor-pointer block">
                </label>
            </div>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
