<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider - Day 4</title>
    <!-- Bootstrap 5 CSS CDN for UI only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 p-3">
        <div class="slider-container">
            <div class="slides">
                <img src="https://picsum.photos/1200/600?random=1" class="slide active" alt="Slide 1">
                <img src="https://picsum.photos/1200/600?random=2" class="slide" alt="Slide 2">
                <img src="https://picsum.photos/1200/600?random=3" class="slide" alt="Slide 3">
                <img src="https://picsum.photos/1200/600?random=4" class="slide" alt="Slide 4">
                <img src="https://picsum.photos/1200/600?random=5" class="slide" alt="Slide 5">
            </div>
            <button class="prev" aria-label="Previous"><</button>
            <button class="next" aria-label="Next">></button>
            <div class="dots">
                <span class="dot active" data-slide="0"></span>
                <span class="dot" data-slide="1"></span>
                <span class="dot" data-slide="2"></span>
                <span class="dot" data-slide="3"></span>
                <span class="dot" data-slide="4"></span>
            </div>
            <div class="toggle-container">
                <input type="checkbox" id="auto-slide" class="form-check-input me-" style="width: 18px; height: 18px; opacity: 1; margin-top: 0;">
                <label for="auto-slide" class="toggle-label form-check-label mb-0">Auto-slide</label>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
