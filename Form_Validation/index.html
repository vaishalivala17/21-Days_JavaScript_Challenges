<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation - Day 5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <div class="form-toggle">
            <button class="toggle-btn active" data-mode="signup">Sign Up</button>
            <button class="toggle-btn" data-mode="login">Login</button>
        </div>
        <form id="authForm" novalidate>
            <div class="signup-only">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" autocomplete="on"/>
                    <span class="error" id="nameError"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" autocomplete="on"/>
                <span class="error" id="emailError"></span>
            </div>
            <div class="form-group password-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password"/>
                <button type="button" class="toggle-password" data-target="password"><i class="fas fa-eye"></i></button>
                <span class="error" id="passwordError"></span>
            </div>
            <div class="signup-only">
                <div class="form-group password-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password"/>
                    <button type="button" class="toggle-password" data-target="confirmPassword"><i class="fas fa-eye"></i></button>
                    <span class="error" id="confirmError"></span>
                </div>
            </div>
            <button type="submit" id="submitBtn" disabled>Sign Up</button>
        </form>
        <div id="successMsg" class="success hidden">Form submitted successfully!</div>
    </div>
    <script src="index.js"></script>
</body>
</html>
