<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Store | Premium Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-gradient-to-br from-rose-50 via-white to-purple-50 min-h-screen py-8">
    <div class="container mx-auto px-4 max-w-7xl">
        <header class="text-center mb-10">
            <p class="text-sm tracking-[0.3em] text-purple-600 uppercase mb-2">Collection 2026</p>
            <h1 class="text-5xl font-serif font-bold bg-gradient-to-r from-purple-600 to-rose-500 bg-clip-text text-transparent mb-3">Luxe Store</h1>
            <p class="text-gray-500 font-light">Discover elegant pieces for the Modern Generation</p>
        </header>

        <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl shadow-purple-100/50 p-6 mb-8 border border-white">
            <div class="flex flex-wrap gap-4 items-center justify-between">
                <!-- Search Input -->
                <div class="flex-1 min-w-[280px]">
                    <div class="relative group">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Search elegant pieces..." 
                            class="w-full px-5 py-3.5 pl-14 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent bg-gray-50/50 transition-all"
                        >
                        <svg class="absolute left-5 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-purple-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>

                <div class="flex gap-2 flex-wrap">
                    <button class="category-btn active px-5 py-2.5 rounded-full bg-gradient-to-r from-purple-600 to-rose-500 text-white font-medium transition-all hover:shadow-lg hover:shadow-purple-300/50" data-category="all">
                        All
                    </button>
                    <button class="category-btn px-5 py-2.5 rounded-full bg-white text-gray-700 font-medium transition-all hover:bg-purple-100 border border-gray-200" data-category="clothing">
                        Dresses
                    </button>
                    <button class="category-btn px-5 py-2.5 rounded-full bg-white text-gray-700 font-medium transition-all hover:bg-purple-100 border border-gray-200" data-category="beauty">
                        Beauty
                    </button>
                    <button class="category-btn px-5 py-2.5 rounded-full bg-white text-gray-700 font-medium transition-all hover:bg-purple-100 border border-gray-200" data-category="electronics">
                        Tech
                    </button>
                    <button class="category-btn px-5 py-2.5 rounded-full bg-white text-gray-700 font-medium transition-all hover:bg-purple-100 border border-gray-200" data-category="fashion">
                        Fashion
                    </button>
                    <button class="category-btn px-5 py-2.5 rounded-full bg-white text-gray-700 font-medium transition-all hover:bg-purple-100 border border-gray-200" data-category="home">
                        Home
                    </button>
                    <button class="category-btn px-5 py-2.5 rounded-full bg-white text-gray-700 font-medium transition-all hover:bg-purple-100 border border-gray-200" data-category="fitness">
                        Fitness
                    </button>
                </div>
            </div>
        </div>

        <div class="mb-6 flex items-center justify-between">
            <p class="text-gray-500">Showing <span id="resultCount" class="font-semibold text-purple-600">0</span> elegant pieces</p>
            <div class="flex items-center gap-2 text-sm text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path>
                </svg>
                <span>Premium Quality</span>
            </div>
        </div>

        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Products will be rendered here -->
        </div>

        <div id="noResults" class="hidden text-center py-12">
            <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <p class="text-gray-500 text-lg">No products found</p>
            <p class="text-gray-400">Try adjusting your search or filter</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
