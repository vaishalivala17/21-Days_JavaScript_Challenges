<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="weather-card">
                    <div class="card-header bg-transparent border-0">
                        <h2 class="text-center mb-4">
                            <i class="bi bi-cloud-sun"></i> Weather App
                        </h2>
                    </div>
                    
                    <!-- Search Section -->
                    <div class="search-box mb-4">
                        <div class="input-group">
                            <input type="text" id="cityInput" class="form-control" placeholder="Enter city name...">
                            <button class="btn btn-search" type="button" id="searchBtn">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </div>

                    <div id="weatherInfo" class="weather-info">
                        <!-- Default Location -->
                        <div class="text-center mb-4">
                            <h3 id="cityName" class="city-name">New York</h3>
                            <p id="date" class="date-text"></p>
                        </div>

                        <div class="temperature-section text-center mb-4">
                            <div class="weather-icon">
                                <i id="weatherIcon" class="bi bi-sun"></i>
                            </div>
                            <h1 id="temperature" class="temperature">22°C</h1>
                            <p id="weatherDesc" class="weather-desc">Clear Sky</p>
                        </div>

                        <div class="row weather-details">
                            <div class="col-4 text-center">
                                <div class="detail-item">
                                    <i class="bi bi-droplet"></i>
                                    <p class="detail-label">Humidity</p>
                                    <p id="humidity" class="detail-value">45%</p>
                                </div>
                            </div>
                            <div class="col-4 text-center">
                                <div class="detail-item">
                                    <i class="bi bi-wind"></i>
                                    <p class="detail-label">Wind</p>
                                    <p id="windSpeed" class="detail-value">12 mph</p>
                                </div>
                            </div>
                            <div class="col-4 text-center">
                                <div class="detail-item">
                                    <i class="bi bi-thermometer-half"></i>
                                    <p class="detail-label">Feels Like</p>
                                    <p id="feelsLike" class="detail-value">20°C</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="errorMessage" class="alert alert-danger d-none" role="alert">
                        <i class="bi bi-exclamation-triangle"></i>
                        <span id="errorText">City not found!</span>
                    </div>

                    <div id="loading" class="loading-spinner d-none">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
